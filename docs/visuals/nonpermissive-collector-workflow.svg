<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960" role="img" aria-labelledby="title desc">
  <title id="title">ShareSurfer nonpermissive collector workflow</title>
  <desc id="desc">A labeled workflow showing read-only collection from file servers and Active Directory inside a restricted network, validation of the CSV export set, and approved package transfer.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .zone { fill: #eef6ff; stroke: #2563eb; stroke-width: 3; stroke-dasharray: 10 8; }
      .checkpoint { fill: #f0fdfa; stroke: #0f766e; stroke-width: 3; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .blue { fill: #eff6ff; stroke: #60a5fa; stroke-width: 2; }
      .green { fill: #ecfdf5; stroke: #34d399; stroke-width: 2; }
      .amber { fill: #fffbeb; stroke: #f59e0b; stroke-width: 2; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #334155; }
      .zone-title { font-family: Arial, Helvetica, sans-serif; font-size: 21px; font-weight: 700; fill: #0f172a; }
      .h { font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; fill: #0f172a; }
      .t { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #334155; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #475569; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 13px; font-weight: 700; fill: #1e40af; }
      .step { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; fill: #ffffff; }
      .badge { fill: #1d4ed8; }
      .badge-green { fill: #0f766e; }
      .badge-amber { fill: #b45309; }
      .arrow { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrowBlue); }
      .arrow-green { stroke: #0f766e; stroke-width: 3; fill: none; marker-end: url(#arrowGreen); }
      .arrow-amber { stroke: #b45309; stroke-width: 3; fill: none; marker-end: url(#arrowAmber); }
      .thin { stroke: #94a3b8; stroke-width: 1.4; fill: none; }
    </style>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="960"/>
  <text x="56" y="58" class="title">Nonpermissive Collection Workflow</text>
  <text x="56" y="90" class="subtitle">Read-only file-share evidence collection inside a restricted network.</text>

  <rect x="44" y="126" width="1278" height="704" rx="24" class="zone"/>
  <text x="76" y="166" class="zone-title">Restricted file-share environment</text>
  <text x="76" y="193" class="small">Raw exports stay inside this boundary until the package is validated and transfer is approved.</text>

  <rect x="82" y="232" width="330" height="246" rx="16" class="blue"/>
  <circle cx="116" cy="266" r="18" class="badge"/>
  <text x="111" y="272" class="step">1</text>
  <text x="146" y="272" class="h">Collector host</text>
  <text class="t">
    <tspan x="112" y="315">Windows PowerShell 5.1</tspan>
    <tspan x="112" y="343">ShareSurfer module only</tspan>
    <tspan x="112" y="371">Read access to scan scope</tspan>
    <tspan x="112" y="399">Directory read access</tspan>
    <tspan x="112" y="427">No target writes during scan</tspan>
  </text>
  <line x1="112" y1="450" x2="382" y2="450" class="thin"/>
  <text x="112" y="468" class="small">Run: Invoke-ShareSurferScan</text>

  <rect x="82" y="518" width="330" height="226" rx="16" class="card"/>
  <circle cx="116" cy="552" r="18" class="badge"/>
  <text x="111" y="558" class="step">2</text>
  <text x="146" y="558" class="h">Runtime inputs</text>
  <text class="t">
    <tspan x="112" y="601">UNC paths or SMB shares</tspan>
    <tspan x="112" y="629">Owner mapping CSV</tspan>
    <tspan x="112" y="657">Discounted principals CSV</tspan>
    <tspan x="112" y="685">OBS attribute chosen at runtime</tspan>
    <tspan x="112" y="713">Depth and path policy thresholds</tspan>
  </text>

  <rect x="482" y="232" width="350" height="246" rx="16" class="card"/>
  <circle cx="516" cy="266" r="18" class="badge"/>
  <text x="511" y="272" class="step">3</text>
  <text x="546" y="272" class="h">File-share evidence</text>
  <text x="512" y="310" class="label">SMB and file system</text>
  <text class="t">
    <tspan x="512" y="342">Share permissions</tspan>
    <tspan x="512" y="370">Folder and file ACLs</tspan>
    <tspan x="512" y="398">Owner and inheritance state</tspan>
    <tspan x="512" y="426">Long paths and deep explicit ACEs</tspan>
    <tspan x="512" y="454">Partial data when collection is limited</tspan>
  </text>

  <rect x="482" y="518" width="350" height="226" rx="16" class="card"/>
  <circle cx="516" cy="552" r="18" class="badge"/>
  <text x="511" y="558" class="step">4</text>
  <text x="546" y="558" class="h">Directory context</text>
  <text x="512" y="596" class="label">Active Directory or LDAP</text>
  <text class="t">
    <tspan x="512" y="628">Users, groups, and recursive edges</tspan>
    <tspan x="512" y="656">EmployeeId and EmployeeNumber</tspan>
    <tspan x="512" y="684">Manager chain levels 1, 2, and 3</tspan>
    <tspan x="512" y="712">OBS path and service-account flags</tspan>
  </text>

  <rect x="902" y="232" width="366" height="330" rx="16" class="green"/>
  <circle cx="936" cy="266" r="18" class="badge-green"/>
  <text x="931" y="272" class="step">5</text>
  <text x="966" y="272" class="h">Validated export dataset</text>
  <text x="932" y="312" class="label">Normalized evidence</text>
  <text class="t">
    <tspan x="932" y="344">shares.csv, items.csv</tspan>
    <tspan x="932" y="372">share_permissions.csv</tspan>
    <tspan x="932" y="400">acl_entries.csv, identities.csv</tspan>
    <tspan x="932" y="428">group_edges.csv, org_chains.csv</tspan>
    <tspan x="932" y="456">owner packets and related data areas</tspan>
    <tspan x="932" y="484">report.html and scan_manifest.csv</tspan>
  </text>
  <line x1="932" y1="511" x2="1236" y2="511" class="thin"/>
  <text x="932" y="536" class="small">Gate: Test-ShareSurferExport</text>

  <rect x="902" y="604" width="366" height="140" rx="16" class="amber"/>
  <circle cx="936" cy="638" r="18" class="badge-amber"/>
  <text x="931" y="644" class="step">6</text>
  <text x="966" y="644" class="h">Transfer package</text>
  <text class="t">
    <tspan x="932" y="684">Compress the validated export folder</tspan>
    <tspan x="932" y="712">Record SHA256 with Get-FileHash</tspan>
  </text>

  <rect x="1360" y="246" width="194" height="374" rx="18" class="checkpoint"/>
  <text x="1388" y="288" class="h">Approved</text>
  <text x="1388" y="316" class="h">transfer</text>
  <text x="1388" y="344" class="h">checkpoint</text>
  <line x1="1388" y1="372" x2="1528" y2="372" class="thin"/>
  <text class="t">
    <tspan x="1388" y="410">Policy review</tspan>
    <tspan x="1388" y="438">Integrity hash</tspan>
    <tspan x="1388" y="466">Trusted handling</tspan>
  </text>
  <text class="small">
    <tspan x="1388" y="522">External support?</tspan>
    <tspan x="1388" y="548">Use a redacted</tspan>
    <tspan x="1388" y="570">support bundle.</tspan>
  </text>

  <path d="M412 352 C444 352 452 352 482 352" class="arrow"/>
  <path d="M412 632 C444 632 452 632 482 632" class="arrow"/>
  <path d="M832 352 C864 352 874 368 902 384" class="arrow-green"/>
  <path d="M832 632 C864 632 874 590 902 536" class="arrow-green"/>
  <path d="M1085 562 L1085 604" class="arrow-amber"/>
  <path d="M1268 674 C1320 674 1318 434 1360 434" class="arrow-amber"/>

  <rect x="82" y="772" width="1186" height="34" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="106" y="794" class="small">Core rule: ShareSurfer collects evidence only. It does not modify permissions, file contents, ownership, groups, or AD objects during a scan.</text>
</svg>
