<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">ShareSurfer redacted support bundle workflow</title>
  <desc id="desc">Raw export is validated, redacted, checked, and packaged with diagnostics for support.</desc>
  <defs>
    <style>
      .bg{fill:#f8fbfc}.raw{fill:#fff3f0;stroke:#d7aaa0;stroke-width:2}.safe{fill:#f0faf7;stroke:#9ccdc2;stroke-width:2}.box{fill:#fff;stroke:#c7d7dc;stroke-width:2}.text{font-family:Segoe UI,Arial,sans-serif;fill:#17202a;font-size:22px}.small{font-size:17px;fill:#536b76}.accent{fill:#0b6e69}.red{fill:#9f1d35}.white{fill:#fff}.arrow{stroke:#0b6e69;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0b6e69"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="520"/>
  <text x="48" y="58" class="text" font-size="34" font-weight="700">Redacted Support Bundle</text>
  <text x="48" y="90" class="small">A shareable diagnostic package without raw names, paths, employee IDs, or business unit labels.</text>
  <g transform="translate(58 150)">
    <rect class="raw" width="235" height="170" rx="8"/>
    <rect class="red" width="235" height="40" rx="8"/>
    <text x="18" y="27" class="white text" font-size="18">Raw Export</text>
    <text x="18" y="78" class="small">CSV export set</text>
    <text x="18" y="112" class="small">Internal only</text>
    <text x="18" y="146" class="small">Contains sensitive data</text>
  </g>
  <path class="arrow" d="M310 235 H390"/>
  <g transform="translate(395 150)">
    <rect class="box" width="235" height="170" rx="8"/>
    <rect class="accent" width="235" height="40" rx="8"/>
    <text x="18" y="27" class="white text" font-size="18">Redaction</text>
    <text x="18" y="78" class="small">Stable tokens</text>
    <text x="18" y="112" class="small">Strict mode option</text>
    <text x="18" y="146" class="small">No reversal map</text>
  </g>
  <path class="arrow" d="M645 235 H725"/>
  <g transform="translate(730 150)">
    <rect class="safe" width="235" height="170" rx="8"/>
    <rect class="accent" width="235" height="40" rx="8"/>
    <text x="18" y="27" class="white text" font-size="18">Diagnostics</text>
    <text x="18" y="78" class="small">Bundle manifest</text>
    <text x="18" y="112" class="small">Row counts</text>
    <text x="18" y="146" class="small">SHA256 hashes</text>
  </g>
  <path class="arrow" d="M982 235 H1050"/>
  <g transform="translate(1005 335)">
    <rect class="safe" width="145" height="80" rx="8"/>
    <text x="18" y="34" class="text" font-size="18">Support</text>
    <text x="18" y="62" class="small">Shareable</text>
  </g>
  <text x="58" y="410" class="small">Preserve relationships across CSVs with stable synthetic IDs while keeping sensitive labels out of bug reports.</text>
</svg>
